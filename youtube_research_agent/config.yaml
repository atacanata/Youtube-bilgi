settings:
  db_path: "data/youtube.db"
  min_score_for_transcript: 7
  allow_unofficial_captions: false
  max_videos_per_channel: 30

scoring:
  keywords_high:
    - "ai"
    - "ajan"
    - "agent"
    - "claude"
    - "claude code"
    - "llm"
    - "automation"
    - "otomasyon"
    - "sistem"
    - "workflow"
    - "json"
    - "prompt"
  keywords_medium:
    - "youtube"
    - "content"
    - "growth"
    - "business"
    - "sales"
    - "marketing"
    - "iş"
    - "verimlilik"

channels:
  - key: "mert"
    name: "Mert Durmaz Digital Academy"
    channel_id: "UCCtwhjWO0NGOAhWOgv3DKFA"
    language_hint: "tr"
    enabled: true
  - key: "hormozi"
    name: "Alex Hormozi"
    channel_id: "UCUyDOdBWhC1MCxEjC46d-zw"
    language_hint: "en"
    enabled: true

# === Sprint 2: Urun/kategori bazli video istihbarati ===
product_research:
  default_intents_per_product: 4     # kota kisiti: urun basina en fazla 4 intent
  min_relevance_score: 7             # esik (config'ten; hardcode degil)
  categories:
    - key: "robot_supurge"
      name: "Robot Süpürge"
      enabled: true                  # SADECE bu kategori acik
      products:
        - "Dreame X50 Ultra"
        - "Roborock S8 MaxV Ultra"
        - "Roborock Qrevo Curv"
        - "Ecovacs X5 Pro Omni"
        - "Dreame L40 Ultra"
      search_intents:                # SADECE en yuksek degerli 4 intent
        - "inceleme"
        - "karşılaştırma"
        - "uzun kullanım"
        - "sorunları"

# === Sprint 4: Yerel STT (DIZUSTU AYARI; RTX PRO 6000 gelince buyutulur) ===
stt:
  enabled: true
  whisper_model_tr: "large-v3-turbo"   # dizustu icin; large-v3 DEGIL
  whisper_model_en: "large-v3-turbo"
  compute_type: "int8_float16"         # 12GB VRAM guvenligi
  beam_size: 5
  device: "cuda"
  delete_audio_after: true
  audio_tmp_dir: "tmp/audio"
  rate_limit:                        # Ban koruması (IP hız sınırı) — insan-benzeri damlama
    max_videos_per_run: 5            # tek komutta en fazla 5 video
    min_delay_between_videos: 45     # video arası min bekleme (sn)
    max_delay_between_videos: 90     # video arası max bekleme (rastgele aralık)
    daily_video_cap: 20              # 24 saatte en fazla 20 video
    cooldown_on_error_sec: 300       # 429/hata sonrası 5 dk bekle
    daily_count_file: "data/.stt_daily_count.json"
